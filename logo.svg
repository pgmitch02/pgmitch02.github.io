<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="logoTitle" preserveAspectRatio="xMidYMid meet">
  <title id="logoTitle">Network M Logo</title>

  <defs>
    <linearGradient id="logoGradient" x1="42" y1="38" x2="278" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B5F8F" />
      <stop offset="52%" stop-color="#2A6D96" />
      <stop offset="100%" stop-color="#0FA8C6" />
    </linearGradient>

    <mask id="lineMask">
      <rect width="100%" height="100%" fill="white" />
      <g fill="black">
        <circle cx="42" cy="38" r="12.5" />
        <circle cx="42" cy="262" r="12.5" />
        <circle cx="80" cy="118" r="12.5" />
        <circle cx="160" cy="152" r="12.5" />
        <circle cx="240" cy="118" r="12.5" />
        <circle cx="278" cy="38" r="12.5" />
        <circle cx="278" cy="262" r="12.5" />
      </g>
    </mask>
  </defs>

  <g mask="url(#lineMask)" fill="none" stroke="url(#logoGradient)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="42" y1="38" x2="42" y2="262" />
    <line x1="278" y1="38" x2="278" y2="262" />

    <line x1="42" y1="38" x2="160" y2="152" />
    <line x1="160" y1="152" x2="278" y2="38" />

    <line x1="42" y1="38" x2="80" y2="118" />
    <line x1="278" y1="38" x2="240" y2="118" />

    <line x1="42" y1="108" x2="80" y2="118" />
    <line x1="240" y1="118" x2="278" y2="108" />

    <line x1="80" y1="118" x2="160" y2="152" />
    <line x1="160" y1="152" x2="240" y2="118" />
    <line x1="80" y1="118" x2="42" y2="262" />
    <line x1="240" y1="118" x2="278" y2="262" />
  </g>

  <g fill="none" stroke="url(#logoGradient)" stroke-width="8.5">
    <circle cx="42" cy="38" r="13" />
    <circle cx="42" cy="262" r="13" />
    <circle cx="80" cy="118" r="13" />
    <circle cx="160" cy="152" r="13" />
    <circle cx="240" cy="118" r="13" />
    <circle cx="278" cy="38" r="13" />
    <circle cx="278" cy="262" r="13" />
  </g>
