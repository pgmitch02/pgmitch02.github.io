<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Mitchell</title>
  <meta
    name="description"
    content="Peter Mitchell | Infrastructure Network Analyst | Portfolio, homelab, professional work, and IT solutions."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="hero-island site-island" id="heroIsland">
        <div class="hero-island-logo-wrap">
          <div class="hero-island-logo" id="heroIslandLogo" aria-label="Network M logo">
            <div class="logo-mark" aria-hidden="true">
              <svg
                width="320"
                height="180"
                viewBox="0 0 320 180"
                xmlns="http://www.w3.org/2000/svg"
                role="img"
              >
                <title>Network M Logo</title>

                <defs>
                  <linearGradient id="logoGradient" x1="40" y1="30" x2="280" y2="30" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#225b86" />
                    <stop offset="100%" stop-color="#0096aa" />
                  </linearGradient>
                </defs>

                <g
                  fill="none"
                  stroke="url(#logoGradient)"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="55" y1="35" x2="55" y2="145" />
                  <line x1="55" y1="35" x2="95" y2="85" />
                  <line x1="55" y1="145" x2="95" y2="85" />

                  <line x1="55" y1="35" x2="160" y2="105" />
                  <line x1="95" y1="85" x2="160" y2="105" />

                  <line x1="160" y1="105" x2="225" y2="85" />

                  <line x1="160" y1="105" x2="265" y2="35" />
                  <line x1="225" y1="85" x2="265" y2="35" />

                  <line x1="265" y1="35" x2="265" y2="145" />
                  <line x1="225" y1="85" x2="265" y2="145" />
                  <line x1="225" y1="85" x2="265" y2="35" />
                </g>

                <g fill="transparent" stroke="url(#logoGradient)" stroke-width="9">
                  <circle cx="55" cy="35" r="17" />
                  <circle cx="55" cy="145" r="17" />
                  <circle cx="95" cy="85" r="17" />
                  <circle cx="160" cy="105" r="17" />
                  <circle cx="225" cy="85" r="17" />
                  <circle cx="265" cy="35" r="17" />
                  <circle cx="265" cy="145" r="17" />
                </g>
              </svg>
            </div>
          </div>
          <div class="island-brand">
            <span class="brand-name" id="brandName">Peter Mitchell</span>
            <span class="brand-role" id="brandRole">Infrastructure Network Analyst</span>
          </div>
        </div>

        <nav class="hero-island-nav" id="heroIslandNav" aria-label="Primary navigation"></nav>

        <button class="theme-toggle island-theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme">
          <span class="theme-icon" id="themeIcon" aria-hidden="true"></span>
          <span id="themeText"></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <span class="eyebrow" id="heroEyebrow"></span>
          <h1 id="heroTitle"></h1>
          <p id="heroIntro"></p>
          <div class="path-grid" id="pathGrid"></div>
        </div>
      </div>
    </section>

    <div class="scroll-sections" id="scrollSections"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span id="year"></span> <span id="footerName">Peter Mitchell</span></span>
      <span id="footerDomain">peter-mitchell.pgmitch.cc</span>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
