<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Mitchell</title>
  <meta name="description" content="Peter Mitchell | Infrastructure Network Analyst | Portfolio, homelab, professional work, and IT solutions." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-name" id="brandName">Peter Mitchell</span>
        <span class="brand-role" id="brandRole">Infrastructure Network Analyst</span>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme">
        <span class="theme-icon" id="themeIcon" aria-hidden="true"></span>
        <span id="themeText"></span>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <span class="eyebrow" id="heroEyebrow"></span>
          <h1 id="heroTitle"></h1>
          <p id="heroIntro"></p>
          <div class="path-grid" id="pathGrid"></div>
        </div>
      </div>
    </section>

    <div class="scroll-sections" id="scrollSections"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span id="year"></span> <span id="footerName">Peter Mitchell</span></span>
      <span id="footerDomain">peter-mitchell.pgmitch.cc</span>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
